<!DOCTYPE html>
<html>
<head>
    <title>Global Engine</title>
</head>
<body>
    <script>
        // Sistema de Redirecionamento Inteligente por IP
        // Este script deve ser hospedado no Vercel
        
        async function routeTraffic() {
            try {
                // Busca a localização do IP do usuário (API gratuita)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const country = data.country_code; // Ex: BR, US, IN

                // LINKS DE ARBITRAGEM (Substitua pelos seus links de Smartlink/CPA)
                const offers = {
                    "US": "https://sua-oferta-premium-usa.com",
                    "BR": "https://sua-oferta-brasil.com",
                    "DEFAULT": "https://seu-smartlink-global.com"
                };

                const destination = offers[country] || offers["DEFAULT"];
                
                // Redirecionamento instantâneo
                window.location.replace(destination);
            } catch (e) {
                // Se falhar, manda para o link global padrão
                window.location.replace("https://seu-smartlink-global.com");
            }
        }

        routeTraffic();
    </script>
    <p>Redirecionando para a melhor oferta...</p>
</body>
</html>

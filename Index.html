<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aion Strategic Analyzer - ROI v1.0</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff41; padding: 30px; box-shadow: 0 0 15px #00ff41; max-width: 500px; width: 90%; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #00ff41; color: #00ff41; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; }
        #result { margin-top: 20px; font-size: 0.9em; text-align: left; border-top: 1px solid #333; padding-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h3>[AION_STRATEGY_ANALYZER]</h3>
        <p>Insira o custo da sua operação mensal (R$):</p>
        <input type="number" id="cost" placeholder="Ex: 5000">
        <button onclick="run()">PROCESSAR ASSIMETRIA</button>
        <div id="result"></div>
    </div>
    <script>
        function run() {
            const cost = document.getElementById('cost').value;
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.innerHTML = "Calculando sinapses...<br>Identificando gargalos...<br><br><b>[DIAGNÓSTICO]:</b> Você está perdendo aproximadamente " + (cost * 0.35).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}) + " por mês por falta de automação de fluxo.<br><br><b>[RECOMENDAÇÃO]:</b> Utilize a ferramenta de Fluxo Autônomo para recuperar 40% do seu tempo.";
        }
    </script>
</body>
</html>
